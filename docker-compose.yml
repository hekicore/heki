version: "3"
services:
  heki:
    image: hekicore/heki:latest
    restart: on-failure
    network_mode: host
    environment:
      type: sspanel-uim       # 可选: sspanel-uim, xboard, v2board, xiaov2board, ppanel
      server_type: v2ray    # 可选: v2ray, vmess, vless, ss, ssr, trojan, hysteria, tuic, anytls, naive, mieru
      panel_url: https://your-panel.com
      panel_key: your-api-key
      node_id: 1
      heki_key: your-heki-license-key
      # 可选配置
      # log_level: info
      # cert_domain: your-domain.com
      # cert_mode: http
    volumes:
      - /etc/heki/:/etc/heki/
